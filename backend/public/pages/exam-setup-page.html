// ── Helpers ──────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: 'include', ...opts });
  if (res.status === 401) { window.location.href = '/login'; return null; }
  return res;  // return raw response so callers can check res.ok
}

function showError(msg) {
  let el = document.getElementById('publish-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'publish-error';
    el.className = 'mt-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-medium border border-red-200 dark:border-red-800';
    document.querySelector('.space-y-5').appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  const el = document.getElementById('publish-error');
  if (el) el.style.display = 'none';
}

// ── Load course dropdown from DB ─────────────────────────────
// Uses /api/students/sections which returns distinct sections
// with course_code, course_name, year_session, year, initials.
// comment out loadcoursedropdwon() for replacement
async function loadCourseDropdown() {
//  const res = await api('/api/students/sections');
const res = await api('/api/students/sections-all');
  if (!res || !res.ok) return;
  const data = await res.json();

  // Build unique course list from sections
  const courses = new Map(); // course_code → course_name
  (data.sections || []).forEach(sec => {
    if (!courses.has(sec.course_code))
      courses.set(sec.course_code, sec.course_name || sec.course_code);
  });

  // Store all sections for cascading later
  window._allSections = data.sections || [];

  const sel = document.getElementById('inp-course-select');
  sel.innerHTML = '<option value="">— select course —</option>';
  [...courses.entries()].sort().forEach(([code, name]) => {
    const opt = document.createElement('option');
    opt.value        = code;
    opt.dataset.name = name;
    opt.textContent  = `${code} — ${name}`;
    sel.appendChild(opt);
  });
}

// ── Course → Section cascade ──────────────────────────────────
// commented out this for course selection.
document.getElementById('inp-course-select').addEventListener('change', function () {
  const code    = this.value;
  const secSel  = document.getElementById('inp-section-select');

  if (!code) {
    secSel.innerHTML = '<option value="">Select course first</option>';
    secSel.disabled  = true;
    document.getElementById('inp-instructor').value = '';
    return;
  }

  // Filter pre-loaded sections for this course_code
  const matching = (window._allSections || []).filter(s => s.course_code === code);

  secSel.innerHTML = '<option value="">— select section —</option>';
  secSel.disabled  = false;

  matching.sort((a, b) => a.section_name.localeCompare(b.section_name))
    .forEach(sec => {
      const opt = document.createElement('option');
      opt.value              = sec.section_id;
      opt.dataset.initials   = sec.initials   || '';
      opt.dataset.courseName = sec.course_name || code;
      opt.textContent        = `Section ${sec.section_name}${sec.initials ? ' — ' + sec.initials : ''} (${sec.year_session} ${sec.year})`;
      secSel.appendChild(opt);
    });
});

// ── Section → auto-fill Instructor ───────────────────────────
document.getElementById('inp-section-select').addEventListener('change', function () {
  const opt      = this.options[this.selectedIndex];
  const initials = opt?.dataset.initials || '';
  if (initials) document.getElementById('inp-instructor').value = initials;
});

// ── Publish Exam → POST /api/sessions ────────────────────────
async function publishExam() {
  hideError();

  const title    = document.getElementById('examTitle').value.trim();
  const courseEl = document.getElementById('inp-course-select');
  const secEl    = document.getElementById('inp-section-select');
  const instructor = document.getElementById('inp-instructor').value.trim();
  const examType   = document.getElementById('inp-exam-type').value;
  const date       = document.getElementById('inp-date').value;
  const time       = document.getElementById('inp-time').value;

  // Validation
  if (!title || title === 'e.g. Mid-term Biology 101') {
    showError('Exam Title is required.'); return;
  }

  // Build time_block string from date + start time if both set
  let timeBlock = null;
  if (date && time) {
    const d = new Date(`${date}T${time}`);
    timeBlock = d.toLocaleString('en-BD', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true,
    });
  } else if (time) {
    timeBlock = time;
  }

  // Course name from selected option's data attribute
  const courseOpt  = courseEl.options[courseEl.selectedIndex];
  const courseName = courseOpt?.dataset.name || courseEl.value || null;

  // section_id as integer (null if not selected)
  const sectionId = secEl.value ? parseInt(secEl.value) : null;

  // Set Publish button to loading state
  const btn = document.querySelector('[onclick="publishExam()"]');
  const origHTML = btn.innerHTML;
  btn.disabled  = true;
  btn.innerHTML = '<span class="material-icons-round text-base mr-2 animate-spin">refresh</span>Publishing…';

  const res = await api('/api/sessions', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name:            title,
      course_name:     courseName  || null,
      instructor_name: instructor  || null,
      time_block:      timeBlock   || null,
      exam_type:       examType    || 'midterm',
      section_id:      sectionId,
    }),
  });

  btn.disabled  = false;
  btn.innerHTML = origHTML;

  if (!res) return; // 401 already handled

  const data = await res.json();

  if (!res.ok) {
    showError(data.error || 'Failed to create session. Try again.');
    return;
  }

  // Success → go to session detail page
  //window.location.href = `/session?id=${data.session.id}`;
  window.location.href = `/dashboard`;
}

// Enter key on any input triggers publish
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') publishExam(); });
});
