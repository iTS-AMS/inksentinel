<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ExamNexus | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              display: ["Public Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
  <!-- <link rel="stylesheet" href="/css/style.css"> -->
</head>
  <body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >

  <header
      class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-background-dark/50 backdrop-blur-sm sticky top-0 z-50"
    >
      <div class="flex items-center gap-3">
        <div class="p-2 bg-primary rounded-lg text-white">
          <span class="material-symbols-outlined block">grid_view</span>
        </div>
        <h2 class="text-xl font-bold tracking-tight">ExamNexus</h2>
      </div>
      <div class="flex gap-4">
        <button
          class="flex items-center justify-center rounded-xl h-10 px-6 bg-primary/10 text-primary text-sm font-bold hover:bg-primary/20 transition-colors"
        >
          Help
        </button>
      </div>
    </header>


    <!-- previous version inksentinel version -->
<div class="login-page">
  <div class="login-grid"></div>

  <div class="login-panel">
    <div class="login-logo">
      <div class="login-icon">◈</div>
      <div>
        <div class="login-title">PROCTOR</div>
        <div class="login-sub">Exam Monitoring System</div>
      </div>
    </div>

    <hr class="divider">

    <div class="login-heading">SECURE ACCESS</div>
    <div class="login-desc">Authorized personnel only</div>

    <div class="error-box" id="error-box" style="display:none">
      <span>⚠</span>
      <span id="error-msg"></span>
    </div>

    <div class="form-field">
      <label for="username">Username</label>
      <input class="input" id="username" type="text"
        placeholder="Enter username" autocomplete="username">
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <input class="input" id="password" type="password"
        placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary submit-btn" id="login-btn" onclick="doLogin()">
      SIGN IN
    </button>

    <div class="login-footer">Demo credentials: admin / proctor123</div>
  </div>
</div>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn      = document.getElementById('login-btn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Please enter username and password');
      return;
    }

    btn.textContent = 'AUTHENTICATING...';
    btn.disabled    = true;

    const res  = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      window.location.href = data.redirect;
    } else {
      showError(data.error || 'Login failed');
      btn.textContent = 'SIGN IN';
      btn.disabled    = false;
    }
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent  = msg;
    document.getElementById('error-box').style.display = 'flex';
  }
</script>
</body>
</html>
