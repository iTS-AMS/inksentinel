<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>All Sessions | ExamNexus</title>

  <!-- Theme runs before Tailwind / first paint — no flash -->
  <script src="../scripts/theme-controller.js"></script>

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary:            '#FF5722',
            secondary:          '#10B981',
            danger:             '#EF4444',
            warning:            '#F59E0B',
            'background-light': '#F9FAFB',
            'background-dark':  '#111827',
            'surface-light':    '#FFFFFF',
            'surface-dark':     '#1F2937',
            'text-light':       '#1F2937',
            'text-dark':        '#F3F4F6',
            'border-light':     '#E5E7EB',
            'border-dark':      '#374151',
            'subtext-light':    '#64748B',
            'subtext-dark':     '#94A3B8',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { animation: pulse-dot 1.5s infinite; }
    tr.hidden-row { display: none; }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark antialiased h-screen flex overflow-hidden transition-colors duration-200">

  <!-- Sidebar injected by component-loader -->
  <aside id="sidebar-placeholder"
    class="w-64 flex-shrink-0 bg-surface-light dark:bg-surface-dark border-r border-border-light dark:border-border-dark h-full">
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col h-full overflow-hidden">

    <!-- Page header -->
    <header class="bg-background-light dark:bg-background-dark border-b border-border-light dark:border-border-dark px-8 py-5 flex items-center justify-between shrink-0 transition-colors duration-200">
      <div>
        <h1 class="text-2xl font-bold">Session Management</h1>
        <p class="text-sm text-subtext-light dark:text-subtext-dark mt-0.5" id="session-count">Loading…</p>
      </div>
      <!-- <button onclick="openModal()"
        class="bg-primary hover:bg-orange-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-sm flex items-center gap-2 transition-colors">
        <span class="material-icons-round text-base">add</span>
        New Session
      </button> -->
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto px-8 py-6">

      <!-- Search + count row -->
      <div class="flex items-center gap-4 mb-5">
        <div class="relative flex-1 max-w-md">
          <span class="material-icons-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg pointer-events-none select-none">search</span>
          <input id="search-input" oninput="filterTable()" placeholder="Search sessions…"
            class="w-full pl-10 pr-4 py-2.5 bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" />
        </div>
        <span id="result-count" class="text-sm text-subtext-light dark:text-subtext-dark ml-auto"></span>
      </div>

      <!-- Table -->
      <div class="bg-surface-light dark:bg-surface-dark rounded-xl border border-border-light dark:border-border-dark overflow-hidden shadow-sm">
        <table class="w-full border-collapse">
          <thead>
            <tr class="border-b border-border-light dark:border-border-dark">
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Session Name</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Course</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Instructor</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Seats</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Alerts</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Status</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Created</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-subtext-light dark:text-subtext-dark uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="sessions-table">
            <tr><td colspan="8" class="px-5 py-16 text-center text-sm text-subtext-light dark:text-subtext-dark">Loading sessions…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- New Session Modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-8 flex flex-col gap-5 border border-border-light dark:border-border-dark">

      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold">New Exam Session</h2>
        <button onclick="closeModal()"
          class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-1 rounded-lg transition-colors">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>

      <!-- Name -->
      <div>
        <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">
          Session Name <span class="text-danger normal-case font-normal">*</span>
        </label>
        <input id="inp-name" maxlength="80" placeholder="e.g. CSE299_Midterm_April2026"
          class="w-full bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" />
        <p class="text-xs text-subtext-light dark:text-subtext-dark mt-1">Special characters become underscores.</p>
      </div>

      <!-- Course -->
      <div>
        <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">Course</label>
        <div class="relative">
          <select id="inp-course-select"
            class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow">
            <option value="">Select course…</option>
          </select>
          <span class="material-icons-round absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
        </div>
      </div>

      <!-- Section -->
      <div>
        <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">Section</label>
        <div class="relative">
          <select id="inp-section-select" disabled
            class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow disabled:opacity-50 disabled:cursor-not-allowed">
            <option value="">Select course first</option>
          </select>
          <span class="material-icons-round absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
        </div>
      </div>

      <!-- Course name override + Instructor -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">
            Course Name <span class="normal-case font-normal text-gray-400">(override)</span>
          </label>
          <input id="inp-course" placeholder="e.g. Junior Design Project"
            class="w-full bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" />
        </div>
        <div>
          <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">Instructor</label>
          <input id="inp-instructor" placeholder="e.g. Dr. Rahman"
            class="w-full bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" />
        </div>
      </div>

      <!-- Time + Exam type -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">Time Block</label>
          <input id="inp-time" placeholder="e.g. 09:00 – 11:00"
            class="w-full bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" />
        </div>
        <div>
          <label class="block text-xs font-bold text-subtext-light dark:text-subtext-dark uppercase tracking-wide mb-1.5">Exam Type</label>
          <div class="relative">
            <select id="inp-exam-type"
              class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border border-border-light dark:border-border-dark rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow">
              <option value="midterm">Midterm</option>
              <option value="quiz">Quiz</option>
              <option value="final">Final</option>
              <option value="mock">Mock</option>
            </select>
            <span class="material-icons-round absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div id="modal-error" class="hidden px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-medium border border-red-200 dark:border-red-800"></div>

      <!-- Footer -->
      <div class="flex gap-3 justify-end pt-1">
        <button onclick="closeModal()"
          class="text-sm font-medium text-subtext-light dark:text-subtext-dark hover:text-text-light dark:hover:text-text-dark border border-border-light dark:border-border-dark px-5 py-2.5 rounded-lg transition-colors">
          Cancel
        </button>
        <button onclick="createSession()"
          class="bg-primary hover:bg-orange-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-sm flex items-center gap-2 transition-colors">
          <span class="material-icons-round text-base">play_arrow</span>
          Start Session
        </button>
      </div>
    </div>
  </div>

<script src="../scripts/component-loader.js"></script>
<script>
  async function api(url) {
    try {
      const res = await fetch(url, { credentials: 'include' });
      if (res.status === 401) { window.location.href = '/login'; return null; }
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch (err) { console.error('[api]', url, err.message); return null; }
  }

  let allSessions = [];

  async function loadSessions() {
    const data = await api('/api/sessions');
    if (!data) {
      document.getElementById('sessions-table').innerHTML =
        '<tr><td colspan="8" class="px-5 py-16 text-center text-sm text-subtext-light dark:text-subtext-dark">Failed to load sessions.</td></tr>';
      return;
    }
    allSessions = data.sessions || [];
    _updateCount(allSessions.length, allSessions.length);
    renderTable(allSessions);
  }

  function _updateCount(visible, total) {
    document.getElementById('session-count').textContent =
      `${total} session${total !== 1 ? 's' : ''} total`;
    const q = document.getElementById('search-input').value.trim();
    document.getElementById('result-count').textContent =
      q ? `${visible} results` : `${total} results`;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderTable(sessions) {
    const tbody = document.getElementById('sessions-table');
    if (!sessions.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="px-5 py-16 text-center text-sm text-subtext-light dark:text-subtext-dark">No sessions yet — click "New Session" to start.</td></tr>';
      return;
    }
    tbody.innerHTML = sessions.map(s => {
      const isActive  = !s.ended_at;
      const alerts    = Number(s.detection_count || 0);
      const seats     = Number(s.seat_count || 0);
      const folderCls = isActive
        ? 'bg-orange-100 dark:bg-orange-900/30 text-primary'
        : 'bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500';
      const alertCls  = alerts > 0 ? 'font-semibold text-warning' : 'text-gray-300 dark:text-gray-600';
      const badge     = isActive
        ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">
             <span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse-dot"></span>Active</span>`
        : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gray-100 dark:bg-gray-700 text-subtext-light dark:text-subtext-dark">Completed</span>`;
      return `
        <tr data-name="${escHtml((s.name||'').toLowerCase())}"
            data-course="${escHtml((s.course_name||'').toLowerCase())}"
            data-instructor="${escHtml((s.instructor_name||'').toLowerCase())}"
            onclick="window.location='/session?id=${s.id}'"
            class="border-b border-border-light dark:border-border-dark last:border-b-0 hover:bg-orange-50/50 dark:hover:bg-gray-700/40 transition-colors cursor-pointer">
          <td class="px-5 py-4">
            <div class="flex items-center gap-3">
              <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0 ${folderCls}">
                <span class="material-icons-outlined text-base">${isActive?'folder_open':'folder'}</span>
              </div>
              <span class="text-sm ${isActive?'font-bold':'font-medium'}">${escHtml(s.name)}</span>
            </div>
          </td>
          <td class="px-5 py-4 text-sm text-subtext-light dark:text-subtext-dark">${escHtml(s.course_name||'—')}</td>
          <td class="px-5 py-4 text-sm text-subtext-light dark:text-subtext-dark">${escHtml(s.instructor_name||'—')}</td>
          <td class="px-5 py-4 text-sm font-semibold">${seats}</td>
          <td class="px-5 py-4 text-sm ${alertCls}">${alerts}</td>
          <td class="px-5 py-4">${badge}</td>
          <td class="px-5 py-4 text-sm text-subtext-light dark:text-subtext-dark">${fmtDate(s.created_at)}</td>
          <td class="px-5 py-4" onclick="event.stopPropagation()">
            <div class="flex items-center gap-1">
              <button title="View session" onclick="window.location='/session?id=${s.id}'"
                class="p-1.5 rounded-lg text-gray-400 hover:text-primary hover:bg-orange-50 dark:hover:bg-orange-900/20 transition-colors">
                <span class="material-icons-outlined text-lg">visibility</span>
              </button>
              ${isActive?`<button title="End session" onclick="confirmEnd(${s.id})"
                class="p-1.5 rounded-lg text-gray-400 hover:text-danger hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                <span class="material-icons-outlined text-lg">stop_circle</span>
              </button>`:''}
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function filterTable() {
    const q    = document.getElementById('search-input').value.toLowerCase().trim();
    const rows = document.querySelectorAll('#sessions-table tr[data-name]');
    let visible = 0;
    rows.forEach(row => {
      const match = !q
        || (row.dataset.name||'').includes(q)
        || (row.dataset.course||'').includes(q)
        || (row.dataset.instructor||'').includes(q);
      row.classList.toggle('hidden-row', !match);
      if (match) visible++;
    });
    _updateCount(visible, allSessions.length);
  }

  async function confirmEnd(id) {
    if (!confirm('End this session? Cameras will need to reconnect for the next one.')) return;
    const res = await fetch(`/api/sessions/${id}/end`, { method:'PUT', credentials:'include' });
    if (res.ok) loadSessions(); else alert('Failed to end session.');
  }

  // Modal
  function openModal() {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('inp-name').focus();
    document.getElementById('modal-error').classList.add('hidden');
    loadCourseDropdown();
  }
  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    ['inp-name','inp-course','inp-instructor','inp-time'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('inp-exam-type').value = 'midterm';
    document.getElementById('inp-course-select').value = '';
    document.getElementById('inp-section-select').innerHTML = '<option value="">Select course first</option>';
    document.getElementById('inp-section-select').disabled = true;
    document.getElementById('modal-error').classList.add('hidden');
  }
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  async function loadCourseDropdown() {
    try {
      const res = await fetch('/api/students/sections', { credentials: 'include' });
      if (!res || !res.ok) return;
      const data = await res.json();
      const courses = new Map();
      (data.sections||[]).forEach(sec => {
        if (!courses.has(sec.course_code)) courses.set(sec.course_code, sec.course_name || sec.course_code);
      });
      window._allSections = data.sections || [];
      const sel = document.getElementById('inp-course-select');
      sel.innerHTML = '<option value="">Select course…</option>';
      [...courses.entries()].sort().forEach(([code, name]) => {
        const o = document.createElement('option');
        o.value = code; o.dataset.name = name;
        o.textContent = `${code} — ${name}`; sel.appendChild(o);
      });
    } catch(_) {}
  }

  document.getElementById('inp-course-select').addEventListener('change', function() {
    const code = this.value;
    const name = this.options[this.selectedIndex]?.dataset.name || '';
    if (name) document.getElementById('inp-course').value = name;
    const secSel = document.getElementById('inp-section-select');
    if (!code) { secSel.innerHTML = '<option value="">Select course first</option>'; secSel.disabled = true; return; }
    const matching = (window._allSections||[]).filter(s => s.course_code === code);
    secSel.innerHTML = '<option value="">— select section —</option>';
    secSel.disabled  = false;
    matching.sort((a,b) => a.section_name.localeCompare(b.section_name)).forEach(sec => {
      const o = document.createElement('option');
      o.value = sec.section_id;
      o.dataset.initials   = sec.initials   || '';
      o.dataset.courseName = sec.course_name || code;
      o.textContent = `Section ${sec.section_name}${sec.initials?' — '+sec.initials:''} (${sec.year_session} ${sec.year})`;
      secSel.appendChild(o);
    });
  });

  document.getElementById('inp-section-select').addEventListener('change', function() {
    const i = this.options[this.selectedIndex]?.dataset.initials || '';
    if (i) document.getElementById('inp-instructor').value = i;
  });

  async function createSession() {
    const name       = document.getElementById('inp-name').value.trim();
    const courseEl   = document.getElementById('inp-course-select');
    const secEl      = document.getElementById('inp-section-select');
    const course     = document.getElementById('inp-course').value.trim();
    const instructor = document.getElementById('inp-instructor').value.trim();
    const time       = document.getElementById('inp-time').value.trim();
    const examType   = document.getElementById('inp-exam-type').value;
    const errEl      = document.getElementById('modal-error');

    if (!name) { errEl.textContent = 'Session name is required.'; errEl.classList.remove('hidden'); return; }

    const courseName = course || courseEl.options[courseEl.selectedIndex]?.dataset.name || null;
    const sectionId  = secEl.value ? parseInt(secEl.value) : null;

    try {
      const res = await fetch('/api/sessions', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
        body: JSON.stringify({ name, course_name: courseName, instructor_name: instructor||null,
          time_block: time||null, exam_type: examType||'midterm', section_id: sectionId }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Failed to create session.'; errEl.classList.remove('hidden'); return; }
      closeModal();
      window.location.href = `/session?id=${data.session.id}`;
    } catch(_) { errEl.textContent = 'Network error. Please try again.'; errEl.classList.remove('hidden'); }
  }

  document.querySelectorAll('#modal input, #modal select').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') createSession(); });
  });

  loadSessions();
</script>
</body>
</html>
