<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkSentinel — Camera</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #07080d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; font-family: monospace;
      color: #e2e8f0;
    }

    #setup {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      padding: 32px;
      background: #0d1117;
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 14px;
      width: 340px;
    }
    #setup.hidden { display: none; }

    .logo { font-size: 32px; color: #00d4ff; margin-bottom: 8px; }
    .title {
      font-size: 18px; font-weight: 700;
      letter-spacing: 0.18em; color: #e2e8f0;
    }
    .sub { font-size: 10px; color: #445566; letter-spacing: 0.10em; margin-bottom: 4px; }

    input[type=text], select {
      width: 100%; background: #131920;
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 4px; color: #e2e8f0;
      padding: 10px 14px; font-family: monospace;
      font-size: 13px; outline: none;
      text-align: center;
    }
    input[type=text]:focus,
    select:focus { border-color: #00d4ff; }

    select option { background: #131920; color: #e2e8f0; }

    /* camera select label */
    .field-label {
      font-size: 10px; letter-spacing: 0.10em;
      color: #445566; align-self: flex-start;
      margin-bottom: -6px;
    }

    button {
      width: 100%; background: #00d4ff;
      color: #07080d; border: none;
      border-radius: 4px; padding: 11px;
      font-family: monospace; font-size: 13px;
      font-weight: 700; letter-spacing: 0.08em;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #33ddff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #led-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #led-wrap.visible { display: flex; }

    #led {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: #1a2a1a;
      box-shadow: 0 0 30px rgba(0,200,83,0.3);
      transition: all 0.3s;
    }
    #led.clear      { background:#1a2a1a; box-shadow: 0 0 30px rgba(0,200,83,0.3); }
    #led.alert      { background:#2a0000; box-shadow: 0 0 50px rgba(255,59,59,0.8); animation: alertPulse 1s infinite; }
    #led.connecting { background:#1a1a00; box-shadow: 0 0 20px rgba(255,220,0,0.4); animation: blink 1s infinite; }

    @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes alertPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    #status-text  { font-size: 12px; letter-spacing: 0.10em; color: #8899aa; }
    #detect-text  { font-size: 11px; letter-spacing: 0.06em; color: #ff3b3b; min-height: 16px; }
    #feed-label   { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: #00d4ff; }
    #camera-info  { font-size: 10px; color: #445566; letter-spacing: 0.06em; }

    video, canvas { display: none; }

    #disconnect-btn {
      width: 160px !important;
      background: transparent !important;
      border: 1px solid rgba(255,59,59,0.4) !important;
      color: #ff3b3b !important;
      padding: 8px 16px !important;
      font-size: 11px !important;
      letter-spacing: 0.08em !important;
    }
    #disconnect-btn:hover {
      background: rgba(255,59,59,0.1) !important;
    }
  </style>
</head>
<body>

<!-- Setup screen -->
<div id="setup">
  <div class="logo">◈</div>
  <div class="title">INKSENTINEL</div>
  <div class="sub">CAMERA DEVICE</div>

  <input type="text" id="label-input"
    placeholder="Seat label e.g. Seat 01"
    maxlength="40">

  <span class="field-label">Camera device</span>
  <select id="camera-select">
    <option value="">— detecting cameras... —</option>
  </select>

  <button id="start-btn" onclick="startCamera()" disabled>
    START CAMERA
  </button>
</div>

<!-- Live screen -->
<div id="led-wrap">
  <div id="led" class="connecting"></div>
  <div id="feed-label">—</div>
  <div id="camera-info">—</div>
  <div id="status-text">Connecting...</div>
  <div id="detect-text"></div>
  <button id="disconnect-btn" onclick="disconnectCamera()">
    ⏹ DISCONNECT
  </button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
  const SERVER   = window.location.origin
    .replace('http://', 'ws://')
    .replace('https://', 'wss://');

  const SEND_FPS = 10;

  let ws            = null;
  let sendInterval  = null;
  let currentLabel  = '';
  let selectedDeviceId = null;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const select = document.getElementById('camera-select');
  const startBtn = document.getElementById('start-btn');

  // ── Enumerate cameras on page load ─────────────────────────
  // We need to request permission first before labels are visible.
  // Strategy: request a throwaway stream, enumerate, then stop it.
  async function populateCameraList() {
    try {
      // Temporary stream just to unlock device labels
      const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
      tmp.getTracks().forEach(t => t.stop());
    } catch (_) {
      // Permission denied — list will show generic names
    }

    const devices = await navigator.mediaDevices.enumerateDevices();
    const cameras = devices.filter(d => d.kind === 'videoinput');

    select.innerHTML = '';

    if (cameras.length === 0) {
      select.innerHTML = '<option value="">No cameras found</option>';
      return;
    }

    cameras.forEach((cam, i) => {
      const opt   = document.createElement('option');
      opt.value   = cam.deviceId;
      // label is available after permission granted
      opt.text    = cam.label || `Camera ${i + 1}`;
      select.appendChild(opt);
    });

    // pre-select first camera
    selectedDeviceId = cameras[0].deviceId;
    startBtn.disabled = false;
  }

  select.addEventListener('change', () => {
    selectedDeviceId = select.value;
  });

  // ── Start camera ────────────────────────────────────────────
  async function startCamera() {
    currentLabel = document.getElementById('label-input').value.trim();
    if (!currentLabel) {
      alert('Please enter a seat label');
      return;
    }
    if (!selectedDeviceId) {
      alert('Please select a camera');
      return;
    }

    startBtn.disabled    = true;
    startBtn.textContent = 'Starting...';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: { exact: selectedDeviceId },
          width: 1280, height: 720
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      canvas.width  = video.videoWidth  || 1280;
      canvas.height = video.videoHeight || 720;

      // Show which camera is active
      const activeCam = [...select.options].find(o => o.value === selectedDeviceId);
      document.getElementById('camera-info').textContent =
        activeCam ? activeCam.text : 'Camera active';

      document.getElementById('setup').className    = 'hidden';
      document.getElementById('led-wrap').className = 'visible';
      document.getElementById('feed-label').textContent = currentLabel;

      setStatus('connecting', 'Connecting to server...', '');
      connect();

    } catch (err) {
      startBtn.disabled    = false;
      startBtn.textContent = 'START CAMERA';
      alert('Camera error: ' + err.message);
    }
  }

  function setStatus(ledClass, status, detect) {
    document.getElementById('led').className           = ledClass;
    document.getElementById('status-text').textContent = status;
    document.getElementById('detect-text').textContent = detect || '';
  }

  // ── WebSocket ───────────────────────────────────────────────
  function connect() {
    const wsUrl = `${SERVER}/ws?role=feed&label=${encodeURIComponent(currentLabel)}`;
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('clear', 'Live — monitoring', '');
      startSending();
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        if (data.type === 'signal') {
          handleSignal(data.signal);
          return;
        }

        if (data.type === 'detection') {
          if (data.detection_count > 0) {
            const labels = data.detections
              .map(d => `${d.class} (${(d.confidence * 100).toFixed(0)}%)`)
              .join(' · ');
            setStatus('alert', 'Activity detected', labels);
          } else {
            setStatus('clear', 'Live — monitoring', '');
          }
        }
      } catch (_) {}
    };

    ws.onclose = () => {
      setStatus('connecting', 'Reconnecting...', '');
      stopSending();
      setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // ── Frame sending ───────────────────────────────────────────
  function startSending() {
    stopSending();
    sendInterval = setInterval(() => {
      if (!ws || ws.readyState !== 1) return;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        if (!blob || ws.readyState !== 1) return;
        blob.arrayBuffer().then(buf => {
          try { ws.send(buf); } catch (_) {}
        });
      }, 'image/jpeg', 0.8);
    }, 1000 / SEND_FPS);
  }

  function stopSending() {
    if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
  }

  // ── Signal handler ──────────────────────────────────────────
  function handleSignal(signal) {
    if (signal === 'buzzer')    triggerBuzzer();
    if (signal === 'led_green') setStatus('clear',  'Warning issued', 'Check your behaviour');
    if (signal === 'led_red')   setStatus('alert',  'STOP', 'Violation flagged by proctor');
    if (signal === 'led_off')   setStatus('clear',  'Live — monitoring', '');
  }

  function triggerBuzzer() {
    try {
      const actx = new AudioContext();
      const osc  = actx.createOscillator();
      const gain = actx.createGain();
      osc.connect(gain);
      gain.connect(actx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.8);
      osc.start();
      osc.stop(actx.currentTime + 0.8);
    } catch (_) {}
  }

  // ── Disconnect ──────────────────────────────────────────────
  function disconnectCamera() {
    stopSending();
    if (ws) { ws.onclose = null; ws.close(); ws = null; }
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    document.getElementById('led-wrap').className = '';
    document.getElementById('setup').className    = '';
    startBtn.disabled    = false;
    startBtn.textContent = 'START CAMERA';
  }

  // ── Init ─────────────────────────────────────────────────────
  populateCameraList();
</script>
</body>
</html>
